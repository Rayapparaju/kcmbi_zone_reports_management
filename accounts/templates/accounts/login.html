{% extends 'base.html' %}
{% load static %}
{% block title %}Login - KCMBI{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card animate-fade-in">
            <div class="auth-header text-center">
                <div class="auth-icon"><i class="fas fa-church"></i></div>
                <h3>Welcome Back</h3>
                <p class="text-muted">Sign in to your KCMBI account</p>
            </div>
            <form method="POST" class="auth-form">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-user me-2"></i>Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label"><i class="fas fa-lock me-2"></i>Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3"><i class="fas fa-sign-in-alt me-2"></i>Sign In</button>
            </form>
            <div class="auth-divider"><span>New to KCMBI?</span></div>
            <div class="d-grid gap-2">
                <a href="{% url 'register_preacher' %}" class="btn btn-outline-primary"><i class="fas fa-user-tie me-2"></i>Register as Preacher</a>
                <a href="{% url 'register_teamleader' %}" class="btn btn-outline-success"><i class="fas fa-users me-2"></i>Register as Team Leader</a>
                <a href="{% url 'register_admin' %}" class="btn btn-outline-dark"><i class="fas fa-user-shield me-2"></i>Register as Admin</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
