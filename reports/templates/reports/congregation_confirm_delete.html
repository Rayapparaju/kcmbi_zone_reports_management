{% extends 'base.html' %}
{% load static %}
{% block title %}Delete Record - KCMBI{% endblock %}
{% block page_title %}Delete Record{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-4">
    <div class="delete-card text-center">
        <div class="delete-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h4 class="mt-3">Are you sure?</h4>
        <p class="text-muted">This action cannot be undone. This will permanently delete this record.</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger btn-lg me-2"><i class="fas fa-trash me-2"></i>Yes, Delete</button>
            <a href="{% url 'congregation_list' %}" class="btn btn-secondary btn-lg"><i class="fas fa-times me-2"></i>Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
